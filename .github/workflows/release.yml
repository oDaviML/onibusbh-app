name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=../app/upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extrai o conteúdo da versão atual do CHANGELOG
          if [ -f CHANGELOG.md ]; then
            # Pega o conteúdo entre o header da versão atual e a versão anterior
            CONTENT=$(awk "/^## \[$GITHUB_REF_NAME\]/,/^## \[v[0-9]/ {if(/^## \[v[0-9]/) exit; if(!(/^## \[$GITHUB_REF_NAME\]/ || /^#/)) print}" CHANGELOG.md | sed '/^$/d' | head -50)
            if [ -z "$CONTENT" ]; then
              # Fallback: pega tudo até a próxima versão
              CONTENT=$(awk "/^## \[$GITHUB_REF_NAME\]/,0" CHANGELOG.md | tail -n +2 | head -50)
            fi
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Consulte o CHANGELOG para detalhes." >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/onibusbh-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Onibus BH ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body || 'Consulte o CHANGELOG para detalhes.' }}
          files: build/app/outputs/flutter-apk/onibusbh-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
