name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=../app/upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract version block: from "## [v1.2.0]" to next "## [v" or end of file
            CONTENT=$(awk -v tag="$GITHUB_REF_NAME" '
              BEGIN { found=0 }
              /^## \[v[0-9]/ && found { exit }
              /^## \['"'"''"'"']?v/ { 
                gsub(/\[|\]|[v'\"']/, "", $0)
                if (index($0, tag) == 1) { found=1; next }
                next
              }
              found { print }
            ' CHANGELOG.md | sed '/^$/d' | head -60)

            if [ -n "$CONTENT" ]; then
              CONTENT="${CONTENT//'%'/'%25'}"
              CONTENT="${CONTENT//$'\n'/'%0A'}"
              CONTENT="${CONTENT//$'\r'/'%0D'}"
              echo "body=$CONTENT" >> $GITHUB_OUTPUT
            else
              echo "body=Consulte o CHANGELOG.md para detalhes." >> $GITHUB_OUTPUT
            fi
          else
            echo "body=Consulte o CHANGELOG.md para detalhes." >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/onibusbh-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Onibus BH ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          files: build/app/outputs/flutter-apk/onibusbh-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
